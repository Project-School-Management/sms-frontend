<mat-sidenav-container class="sidenav-container">

  <!-- ── Sidenav ──────────────────────────────────────────────────────────── -->
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <mat-toolbar color="primary" class="sidenav-header">
      <span>SMS</span>
    </mat-toolbar>

    <mat-nav-list>
      @for (item of visibleNavItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <!-- ── Main content ─────────────────────────────────────────────────────── -->
  <mat-sidenav-content>
    <!-- Topbar -->
    <mat-toolbar color="primary" class="topbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="topbar-title">School Management System</span>
      <span class="spacer"></span>

      <!-- Utilisateur -->
      <span class="user-name">
        {{ authStore.currentUser()?.firstName }} {{ authStore.currentUser()?.lastName }}
      </span>

      <button mat-icon-button (click)="logout()" aria-label="Se déconnecter">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Page content -->
    <main class="main-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
