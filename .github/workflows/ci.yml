name: CI — Test, Build & Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Retire le plugin Nx eslint incompatible
        # @nx/eslint/plugin crashe le graphe de projet car typescript-eslint v8
        # est absent (projet sur v7) — même contournement que le Dockerfile.
        # On garde @nx/jest/plugin (sinon les targets "test" inférées des libs
        # disparaissent et `test --all` ne testerait plus rien silencieusement).
        run: |
          node -e "
            const fs=require('fs');
            const nx=JSON.parse(fs.readFileSync('nx.json','utf8'));
            nx.plugins=nx.plugins.filter(p=>{const n=typeof p==='string'?p:p.plugin;return !n.includes('eslint');});
            fs.writeFileSync('nx.json',JSON.stringify(nx,null,2));
          "

      - name: Run unit tests
        run: npx nx run-many --target=test --all --parallel=3

      - name: Build production
        run: npx nx build sms-web --configuration=production

  docker-build:
    name: Docker image build (validation)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — validation avant merge)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kodjosoule/kalanblonw-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
